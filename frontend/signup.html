<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت نام</title>
    <link rel="stylesheet" href="css/signup.css">
</head>
<body>
    <div id="background" class="background"></div>

    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>لطفاً منتظر بمانید...</p>
    </div>

    <div class="signup-container">
        <div class="signup-box">
            <h1>ثبت نام در <span>سیستم</span></h1>

            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="username">نام کاربری</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="نام کاربری خود را وارد کنید"
                        autocomplete="username"
                    >
                    <span id="usernameError" class="error-message"></span>
                </div>

                <div class="form-group">
                    <label for="password">رمز عبور</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="رمز عبور خود را وارد کنید"
                        autocomplete="new-password"
                    >
                    <span id="passwordError" class="error-message"></span>
                    <div class="password-rules" id="passwordRules">
                        <ul>
                            <li id="ruleLength">حداقل ۸ کاراکتر</li>
                            <li id="ruleUppercase">حداقل یک حرف بزرگ (A-Z)</li>
                            <li id="ruleLowercase">حداقل یک حرف کوچک (a-z)</li>
                            <li id="ruleNumber">حداقل یک عدد (0-9)</li>
                            <li id="ruleSpecial">حداقل یک کاراکتر خاص (@$!%*?&)</li>
                        </ul>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">تایید رمز عبور</label>
                    <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        placeholder="رمز عبور را مجدداً وارد کنید"
                        autocomplete="new-password"
                    >
                    <span id="confirmPasswordError" class="error-message"></span>
                </div>

                <button type="submit" class="signup-btn">ثبت نام</button>
            </form>

            <div class="login-link">
                قبلاً ثبت نام کرده‌اید؟ <a href="index.html">وارد شوید</a>
            </div>

            <div id="generalError" class="error-message general-error"></div>
        </div>
    </div>

    <script src="js/signup.js"></script>
</body>
</html>
